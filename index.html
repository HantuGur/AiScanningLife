<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Life Scanner</title>
<meta name="description" content="Tunjukkan data hidupmu, dan AI akan membacanya. Diagnosis kondisi hidup & kerja berbasis data nyata."/>
<meta property="og:title" content="AI Life Scanner"/>
<meta property="og:description" content="Diagnosis kondisi hidup & kerja berbasis data nyata, bukan chatbot biasa."/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<style>
/* ── Reset & Base ───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { min-height: 100vh; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: 'Space Grotesk', sans-serif;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #0d1117; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

/* ── Layout ─────────────────────────────────── */
.header {
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: .85rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: #58a6ff;
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav {
  display: flex;
  gap: 2px;
  margin-left: auto;
  align-items: center;
}
.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
}

/* ── Cards ──────────────────────────────────── */
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 1.25rem;
}
.card-accent { border-color: rgba(88,166,255,.35); background: rgba(31,58,95,.4); }
.card-green  { border-color: rgba(63,185,80,.35);  background: rgba(15,42,20,.5); }
.card-red    { border-color: rgba(248,81,73,.35);  background: rgba(58,15,15,.5); }
.card-amber  { border-color: rgba(210,153,34,.35); background: rgba(42,31,10,.5); }

/* ── Stat grid ──────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
.stat-grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
.stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: .9rem; text-align: center; }
.stat-num { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: .6px; font-family: 'Space Mono', monospace; }

/* ── Form elements ──────────────────────────── */
.label {
  display: block;
  font-size: 11px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: .7px;
  font-family: 'Space Mono', monospace;
  margin-bottom: 6px;
}
.input {
  width: 100%;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #e6edf3;
  font-size: 14px;
  padding: 9px 12px;
  font-family: 'Space Grotesk', sans-serif;
  outline: none;
  transition: border-color .15s;
}
.input:focus { border-color: #58a6ff; }
.input::placeholder { color: #484f58; }
textarea.input { resize: vertical; line-height: 1.65; }

/* ── Buttons ────────────────────────────────── */
.btn {
  background: #58a6ff;
  border: none;
  color: #0d1117;
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  transition: background .15s, opacity .15s;
}
.btn:hover { background: #79b8ff; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  border: 1px solid #30363d;
  color: #8b949e;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  transition: border-color .15s, color .15s;
}
.btn-ghost:hover { border-color: #484f58; color: #e6edf3; }
.btn-green { background: #3fb950; }
.btn-green:hover { background: #56d364; }
.fab {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: #58a6ff;
  border: none;
  color: #0d1117;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: background .15s, transform .15s;
}
.fab:hover { background: #79b8ff; transform: scale(1.05); }

/* ── NavBtn ─────────────────────────────────── */
.nav-btn {
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: #8b949e;
  cursor: pointer;
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 6px 6px 0 0;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 400;
  transition: color .15s;
}
.nav-btn.active {
  color: #58a6ff;
  border-bottom-color: #58a6ff;
  font-weight: 500;
}
.nav-btn:hover:not(.active) { color: #e6edf3; }

/* ── Range slider ───────────────────────────── */
input[type="range"] {
  width: 100%;
  height: 4px;
  accent-color: #58a6ff;
  cursor: pointer;
}
.range-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #6e7681;
  font-family: 'Space Mono', monospace;
  margin-top: 3px;
}

/* ── Tags / Badges ──────────────────────────── */
.badge {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 400;
}
.tag-pill {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #30363d;
  background: #21262d;
  color: #8b949e;
  transition: all .15s;
  font-family: 'Space Grotesk', sans-serif;
}
.tag-pill.on {
  background: rgba(31,58,95,.6);
  border-color: #58a6ff;
  color: #58a6ff;
}

/* ── Mood buttons ───────────────────────────── */
.mood-btn {
  flex: 1;
  border-radius: 8px;
  padding: 7px 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'Space Grotesk', sans-serif;
  text-align: center;
  line-height: 1.3;
  border: 1px solid #30363d;
  background: #21262d;
  color: #8b949e;
  transition: all .15s;
}

/* ── Diagnosis sections ─────────────────────── */
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 10px;
}
.bottleneck-item {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.bottleneck-num {
  color: #f85149;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  margin-top: 2px;
  flex-shrink: 0;
}
.action-item {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  align-items: flex-start;
}
.action-time {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  white-space: nowrap;
}
.leak-item {
  font-size: 14px;
  color: #e6edf3;
  margin-bottom: 6px;
  padding-left: 12px;
  border-left: 2px solid rgba(210,153,34,.4);
  line-height: 1.55;
}

/* ── Step progress ──────────────────────────── */
.step-bar { width: 28px; height: 3px; border-radius: 2px; transition: background .2s; }

/* ── Trend bars ─────────────────────────────── */
.trend-bar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.trend-bar-val { font-size: 10px; color: #6e7681; font-family: 'Space Mono', monospace; }
.trend-bar-h { width: 100%; display: flex; align-items: flex-end; height: 80px; }
.trend-bar-fill { width: 100%; border-radius: 3px 3px 0 0; opacity: .85; transition: height .3s; }
.trend-bar-lbl { font-size: 9px; color: #6e7681; font-family: 'Space Mono', monospace; text-align: center; }
.trend-bars { display: flex; gap: 6px; align-items: flex-end; }

/* ── Empty state ────────────────────────────── */
.empty { text-align: center; padding: 4rem 1rem; }
.empty-icon { font-family: 'Space Mono', monospace; font-size: 36px; color: #21262d; margin-bottom: 1rem; }

/* ── Scan loading ───────────────────────────── */
.scan-progress {
  width: 100%;
  height: 2px;
  background: #21262d;
  border-radius: 2px;
  overflow: hidden;
}
.scan-fill {
  height: 100%;
  background: #58a6ff;
  border-radius: 2px;
  width: 40%;
  animation: scanmove 1.5s ease-in-out infinite;
}
@keyframes scanmove {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

/* ── Misc ───────────────────────────────────── */
.gap-sm { display: flex; flex-direction: column; gap: .75rem; }
.gap-md { display: flex; flex-direction: column; gap: 1.25rem; }
.gap-lg { display: flex; flex-direction: column; gap: 1.5rem; }
.row    { display: flex; gap: 10px; }
.mono   { font-family: 'Space Mono', monospace; }
.muted  { color: #8b949e; }
.hint   { color: #6e7681; }
.txt-sm { font-size: 13px; }
.txt-xs { font-size: 12px; }
.alert-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #d29922;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: 4px;
}
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- App -->
<script type="text/babel" src="app.js"></script>
</body>
</html>
